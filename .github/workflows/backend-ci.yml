name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-and-sonar:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build, test and SonarCloud
        run: >
          mvn -B verify sonar:sonar
          -Dsonar.projectKey=maria26045_Dockertp2-GIT-repo
          -Dsonar.organization=maria26045
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          --file ./backend/simpleapi/pom.xml